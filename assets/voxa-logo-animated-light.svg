<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 72" fill="none" aria-label="VOXA">
  <!-- Light-theme variant of the animated mark (README on github light): the wordmark drops to
       ink; the pulse-cyan mark is the brand accent and stays. Same once-only choreography. -->
  <style>
    .v { animation: vx-draw 1.1s cubic-bezier(.6,0,.2,1) both; }
    @keyframes vx-draw { from { stroke-dashoffset: 154; } }
    .bar { transform-box: fill-box; transform-origin: 50% 100%;
           animation: vx-rise .3s cubic-bezier(.2,.8,.2,1) both; }
    .b1 { animation-delay: .90s; } .b2 { animation-delay: 1.02s; } .b3 { animation-delay: 1.14s; }
    @keyframes vx-rise { from { transform: scaleY(0); } }
    .word { animation: vx-settle .7s cubic-bezier(.2,.8,.2,1) .9s both; }
    @keyframes vx-settle { from { opacity: 0; letter-spacing: 13px; } }
    @media (prefers-reduced-motion: reduce) { .v, .bar, .word { animation: none; } }
  </style>
  <g transform="translate(4,4) scale(0.64)">
    <path class="v" d="M14,18 L50,86 L86,18" stroke="#29A8E0" stroke-width="7"
          stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="154" />
    <rect class="bar b1" x="38" y="34" width="7" height="22" rx="3.5" fill="#29A8E0" />
    <rect class="bar b2" x="50" y="26" width="7" height="30" rx="3.5" fill="#29A8E0" />
    <rect class="bar b3" x="62" y="38" width="7" height="18" rx="3.5" fill="#29A8E0" />
  </g>
  <text class="word" x="84" y="46" font-family="Inter, 'Segoe UI', system-ui, sans-serif"
        font-size="27" font-weight="700" letter-spacing="5" fill="#0B0F14">VOXA</text>
</svg>
