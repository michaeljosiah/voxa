<!-- @dsCard group="Type" viewport="700x280" name="Type scale" subtitle="11–60px ramp on a 14px UI base" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 16px 24px; }
  .r { display: grid; grid-template-columns: 70px 1fr; align-items: baseline; gap: 16px; padding: 5px 0; border-bottom: 1px solid var(--line-1); }
  .r:last-child { border: none; }
  .t { font-family: var(--font-mono); font-size: 10px; color: var(--text-3); }
  .s { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style>
</head>
<body>
  <div class="r"><span class="t">5xl · 60</span><span class="s" style="font-family: var(--font-display); font-weight: 700; letter-spacing: -0.025em; font-size: var(--fs-5xl); line-height: 1.1;">Voxa</span></div>
  <div class="r"><span class="t">4xl · 44</span><span class="s" style="font-family: var(--font-display); font-weight: 700; letter-spacing: -0.025em; font-size: var(--fs-4xl); line-height: 1.1;">Hero headline</span></div>
  <div class="r"><span class="t">3xl · 34</span><span class="s" style="font-family: var(--font-display); font-weight: 700; letter-spacing: -0.025em; font-size: var(--fs-3xl);">Page title</span></div>
  <div class="r"><span class="t">2xl · 26</span><span class="s" style="font-family: var(--font-display); font-weight: 600; font-size: var(--fs-2xl);">Section heading</span></div>
  <div class="r"><span class="t">xl · 20</span><span class="s" style="font-weight: 600; font-size: var(--fs-xl);">Card heading</span></div>
  <div class="r"><span class="t">lg · 15</span><span class="s" style="font-size: var(--fs-lg);">Lead paragraph</span></div>
  <div class="r"><span class="t">md · 14</span><span class="s" style="font-size: var(--fs-md);">UI base / body</span></div>
  <div class="r"><span class="t">sm · 13</span><span class="s" style="font-size: var(--fs-sm); color: var(--text-2);">Secondary, controls</span></div>
  <div class="r"><span class="t">xs · 12</span><span class="s" style="font-size: var(--fs-xs); color: var(--text-2);">Field labels, hints</span></div>
  <div class="r"><span class="t">2xs · 11</span><span class="s vx-label">micro-label · mono uppercase</span></div>
</body>
</html>
