<!-- @dsCard group="Brand" viewport="700x180" name="Waveform motif" subtitle="The signal bars rising inside the V — used wherever audio speaks" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 22px 24px; display: flex; align-items: flex-end; gap: 36px; }
  .cell { display: flex; flex-direction: column; gap: 10px; }
  .cell span { font-family: var(--font-mono); font-size: 10px; color: var(--text-3); }
  .wave { display: inline-flex; align-items: flex-end; gap: 4px; height: 44px; }
  .wave i { width: 4px; border-radius: 999px; display: block; }
</style>
</head>
<body>
  <div class="cell">
    <span class="wave">
      <i style="height: 50%; background: var(--pulse-400)"></i>
      <i style="height: 68%; background: var(--pulse-400)"></i>
      <i style="height: 41%; background: var(--pulse-400)"></i>
    </span>
    <span>the 22/30/18 signal contour · brand mark</span>
  </div>
  <div class="cell">
    <span class="wave">
      <i style="height: 50%; background: var(--pulse-400)"></i>
      <i style="height: 85%; background: var(--pulse-400)"></i>
      <i style="height: 40%; background: var(--pulse-400)"></i>
      <i style="height: 100%; background: var(--pulse-400)"></i>
      <i style="height: 65%; background: var(--pulse-400)"></i>
      <i style="height: 90%; background: var(--pulse-400)"></i>
      <i style="height: 35%; background: var(--pulse-400)"></i>
      <i style="height: 70%; background: var(--pulse-400)"></i>
    </span>
    <span>ui waveform · live · solid cyan</span>
  </div>
  <div class="cell">
    <span class="wave">
      <i style="height: 50%; background: var(--ink-500)"></i>
      <i style="height: 85%; background: var(--ink-500)"></i>
      <i style="height: 40%; background: var(--ink-500)"></i>
      <i style="height: 100%; background: var(--ink-500)"></i>
      <i style="height: 65%; background: var(--ink-500)"></i>
      <i style="height: 90%; background: var(--ink-500)"></i>
    </span>
    <span>muted · inactive stream</span>
  </div>
</body>
</html>
