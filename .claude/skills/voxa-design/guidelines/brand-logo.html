<!-- @dsCard group="Brand" viewport="700x190" name="Logo" subtitle="Lockup, mark and mono wordmark — dark surfaces only" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 22px 24px; }
  .row { display: flex; align-items: center; gap: 28px; }
  .cell { display: flex; flex-direction: column; gap: 10px; align-items: flex-start; }
  .cell span { font-family: var(--font-mono); font-size: 10px; color: var(--text-3); }
</style>
</head>
<body>
  <div class="row">
    <div class="cell">
      <img src="../assets/voxa-logo.svg" alt="VOXA" style="height: 44px;">
      <span>primary lockup</span>
    </div>
    <div class="cell">
      <img src="../assets/voxa-mark.svg" alt="" style="height: 56px;">
      <span>mark · the V cut by a waveform</span>
    </div>
    <div class="cell">
      <img src="../assets/voxa-icon.svg" alt="" style="height: 56px;">
      <span>app icon · tile</span>
    </div>
    <div class="cell">
      <img src="../assets/voxa-wordmark-mono.svg" alt="VOXA" style="height: 30px;">
      <span>mono wordmark</span>
    </div>
  </div>
  <p style="margin-top: 14px; font-size: 12px; color: var(--text-3);">Clear space = one signal-bar width on all sides. Single cyan — never recolor, never gradient, never place on light backgrounds.</p>
</body>
</html>
