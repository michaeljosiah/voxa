name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0-alpha)'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Pack & publish to NuGet
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore Voxa.slnx

      - name: Build
        run: dotnet build Voxa.slnx --configuration Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test Voxa.slnx --configuration Release --no-build

      - name: Pack
        # Pack EVERY packable project under src/ (auto-discovered) rather than a hand-maintained list —
        # the old explicit list silently went stale (missing Audio.Abstractions, the telephony transports,
        # and the streaming STT vendors), so the meta-package shipped with NuGet dependencies on packages
        # that were never published. Projects marked <IsPackable>false> no-op; apps/samples/bench/tests
        # live outside src/ and are excluded.
        run: |
          shopt -s nullglob
          for proj in src/*/*.csproj; do
            dotnet pack "$proj" --configuration Release --no-build --output ./artifacts -p:Version=${{ steps.version.outputs.version }}
          done

      - name: Push to NuGet
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --skip-duplicate

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: ./artifacts/*.nupkg
