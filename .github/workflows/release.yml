name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0-alpha)'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Pack & publish to NuGet
    runs-on: ubuntu-latest
    timeout-minutes: 30   # fail fast if a step hangs instead of burning the runner for hours
    environment: dev
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore Voxa.slnx

      - name: Build
        run: dotnet build Voxa.slnx --configuration Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Test
        # Run each test project in its own `dotnet test`, and GATE ON THE TEST RESULT, not the host's
        # process exit. Voxa.Studio.Tests' tests pass in ~3s, then its Avalonia-headless test host
        # fails to EXIT (a live teardown thread) so `dotnet test` never returns — in a whole-solution
        # run that poisoned everything and burned the first two v0.6.0-alpha release attempts. Use
        # vstest's OWN `--blame-hang-timeout` (NOT an external `timeout`: SIGTERM kills dotnet before it
        # flushes its summary, so the gate can't see the pass). blame-hang flushes "Passed!" then aborts
        # the stuck host non-zero; accept that IFF the run reported all-passed (a genuine failure /
        # no-results crash still fails). NB: GitHub uses `bash -e`, so capture with `out=$(...) || rc=$?`.
        # LocalModels stays excluded: it has its own model-cached lane in ci.yml.
        run: |
          shopt -s nullglob
          failed=""
          for proj in tests/*/*.csproj; do
            name="$(basename "$proj" .csproj)"
            echo "::group::test ${name}"
            rc=0
            out="$(dotnet test "$proj" --configuration Release --no-build --filter "Category!=LocalModels" --blame-hang-timeout 90s 2>&1)" || rc=$?
            printf '%s\n' "$out"
            echo "::endgroup::"
            [ "${rc}" -eq 0 ] && continue
            if printf '%s' "$out" | grep -qE "Passed!.*Failed:[[:space:]]+0,"; then
              echo "::warning::${name}: tests passed but the test host did not exit (rc=${rc}); accepting"
              continue
            fi
            echo "::error::${name} failed (rc=${rc})"
            failed="${failed} ${name}"
          done
          [ -z "${failed}" ] || { echo "::error::Tests failed:${failed}"; exit 1; }

      - name: Pack
        # Pack EVERY packable project under src/ (auto-discovered) rather than a hand-maintained list —
        # the old explicit list silently went stale (missing Audio.Abstractions, the telephony transports,
        # and the streaming STT vendors), so the meta-package shipped with NuGet dependencies on packages
        # that were never published. Projects marked <IsPackable>false> no-op; apps/samples/bench/tests
        # live outside src/ and are excluded.
        run: |
          shopt -s nullglob
          for proj in src/*/*.csproj; do
            dotnet pack "$proj" --configuration Release --no-build --output ./artifacts -p:Version=${{ steps.version.outputs.version }}
          done

      - name: Push to NuGet
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --skip-duplicate

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: ./artifacts/*.nupkg
