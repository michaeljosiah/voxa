name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0-alpha)'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Pack & publish to NuGet
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore Voxa.slnx

      - name: Build
        run: dotnet build Voxa.slnx --configuration Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test Voxa.slnx --configuration Release --no-build

      - name: Pack
        run: |
          dotnet pack src/Voxa.Core/Voxa.Core.csproj                                       --configuration Release --no-build --output ./artifacts -p:Version=${{ steps.version.outputs.version }}
          dotnet pack src/Voxa.AspNetCore/Voxa.AspNetCore.csproj                           --configuration Release --no-build --output ./artifacts -p:Version=${{ steps.version.outputs.version }}
          dotnet pack src/Voxa.Testing/Voxa.Testing.csproj                                 --configuration Release --no-build --output ./artifacts -p:Version=${{ steps.version.outputs.version }}
          dotnet pack src/Voxa.Transports.WebSocket/Voxa.Transports.WebSocket.csproj       --configuration Release --no-build --output ./artifacts -p:Version=${{ steps.version.outputs.version }}
          dotnet pack src/Voxa.Services.AzureVoiceLive/Voxa.Services.AzureVoiceLive.csproj --configuration Release --no-build --output ./artifacts -p:Version=${{ steps.version.outputs.version }}
          dotnet pack src/Voxa.Services.MicrosoftAgents/Voxa.Services.MicrosoftAgents.csproj --configuration Release --no-build --output ./artifacts -p:Version=${{ steps.version.outputs.version }}
          dotnet pack src/Voxa.Services.OpenAIRealtime/Voxa.Services.OpenAIRealtime.csproj --configuration Release --no-build --output ./artifacts -p:Version=${{ steps.version.outputs.version }}
          dotnet pack src/Voxa.Observability/Voxa.Observability.csproj                     --configuration Release --no-build --output ./artifacts -p:Version=${{ steps.version.outputs.version }}
          dotnet pack src/Voxa.Speech.Abstractions/Voxa.Speech.Abstractions.csproj         --configuration Release --no-build --output ./artifacts -p:Version=${{ steps.version.outputs.version }}
          dotnet pack src/Voxa.Speech.Azure/Voxa.Speech.Azure.csproj                       --configuration Release --no-build --output ./artifacts -p:Version=${{ steps.version.outputs.version }}
          dotnet pack src/Voxa.Speech.OpenAI/Voxa.Speech.OpenAI.csproj                     --configuration Release --no-build --output ./artifacts -p:Version=${{ steps.version.outputs.version }}
          dotnet pack src/Voxa.Speech.ElevenLabs/Voxa.Speech.ElevenLabs.csproj             --configuration Release --no-build --output ./artifacts -p:Version=${{ steps.version.outputs.version }}
          dotnet pack src/Voxa.Speech.Mistral/Voxa.Speech.Mistral.csproj                   --configuration Release --no-build --output ./artifacts -p:Version=${{ steps.version.outputs.version }}
          dotnet pack src/Voxa.Audio.SileroVad/Voxa.Audio.SileroVad.csproj                 --configuration Release --no-build --output ./artifacts -p:Version=${{ steps.version.outputs.version }}

      - name: Push to NuGet
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --skip-duplicate

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: ./artifacts/*.nupkg
