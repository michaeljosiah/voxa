name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0-alpha)'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Pack & publish to NuGet
    runs-on: ubuntu-latest
    timeout-minutes: 30   # fail fast if a step hangs instead of burning the runner for hours
    environment: dev
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore Voxa.slnx

      - name: Build
        run: dotnet build Voxa.slnx --configuration Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Test
        # Run each test project in its own `dotnet test` invocation instead of one whole-solution run.
        # `dotnet test Voxa.slnx` HANGS after every test passes when a test host fails to exit
        # (Voxa.Studio.Tests' Avalonia-headless teardown intermittently leaves a live thread) — it
        # poisons the whole-solution run and burned the first two v0.6.0-alpha release attempts.
        # Per-project + `timeout` isolates it; RETRY once on a non-zero exit since the hang is
        # intermittent (a genuine failure fails both attempts and is reported). NB: GitHub uses
        # `bash -e`, so capture exit codes with `|| rc=$?` or a bare failure aborts the whole step.
        # LocalModels stays excluded: it has its own model-cached lane in ci.yml.
        run: |
          shopt -s nullglob
          failed=""
          for proj in tests/*/*.csproj; do
            name="$(basename "$proj" .csproj)"
            ok=0
            for attempt in 1 2; do
              echo "::group::test ${name} (attempt ${attempt})"
              rc=0
              timeout 120 dotnet test "$proj" --configuration Release --no-build --filter "Category!=LocalModels" || rc=$?
              echo "::endgroup::"
              if [ "${rc}" -eq 0 ]; then ok=1; break; fi
              echo "::warning::test ${name} attempt ${attempt} exited ${rc}$([ "${rc}" -eq 124 ] && echo ' (timeout/hang)')"
            done
            [ "${ok}" -eq 1 ] || failed="${failed} ${name}"
          done
          [ -z "${failed}" ] || { echo "::error::Tests failed/hung after retry:${failed}"; exit 1; }

      - name: Pack
        # Pack EVERY packable project under src/ (auto-discovered) rather than a hand-maintained list —
        # the old explicit list silently went stale (missing Audio.Abstractions, the telephony transports,
        # and the streaming STT vendors), so the meta-package shipped with NuGet dependencies on packages
        # that were never published. Projects marked <IsPackable>false> no-op; apps/samples/bench/tests
        # live outside src/ and are excluded.
        run: |
          shopt -s nullglob
          for proj in src/*/*.csproj; do
            dotnet pack "$proj" --configuration Release --no-build --output ./artifacts -p:Version=${{ steps.version.outputs.version }}
          done

      - name: Push to NuGet
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --skip-duplicate

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: ./artifacts/*.nupkg
