name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0-alpha)'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Pack & publish to NuGet
    runs-on: ubuntu-latest
    timeout-minutes: 30   # fail fast if a step hangs instead of burning the runner for hours
    environment: dev
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore Voxa.slnx

      - name: Build
        run: dotnet build Voxa.slnx --configuration Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Test
        # Run each test project in its own `dotnet test`, and GATE ON THE TRX <Counters>, not the process
        # exit or stdout. Voxa.Studio.Tests' tests pass in ~3s, then its Avalonia-headless test host fails
        # to EXIT (a live teardown thread) so `dotnet test` never returns — in a whole-solution run that
        # burned the first two v0.6.0-alpha release attempts. `--blame-hang-timeout` bounds the hang and
        # (unlike an external `timeout`'s SIGTERM) writes the trx first; on Linux it aborts the host with a
        # non-zero exit + outcome="Failed" WITHOUT printing the "Passed!" summary, so the trx counters are
        # the only reliable signal: pass iff failed=0 AND error=0 AND aborted=0. A real failure has
        # failed>0; a no-results crash has no trx → both fail (missing counters fail-closed). LocalModels
        # stays excluded (its own model-cached lane in ci.yml; empty-filter trx is total=0/failed=0 = pass).
        run: |
          shopt -s nullglob
          failed=""
          for proj in tests/*/*.csproj; do
            name="$(basename "$proj" .csproj)"
            trx="$(dirname "$proj")/TestResults/${name}.trx"
            rm -f "$trx"
            echo "::group::test ${name}"
            dotnet test "$proj" --configuration Release --no-build --filter "Category!=LocalModels" \
              --blame-hang-timeout 90s --logger "trx;LogFileName=${name}.trx" 2>&1 || true
            echo "::endgroup::"
            if [ ! -f "$trx" ]; then echo "::error::${name}: no trx (run did not complete)"; failed="${failed} ${name}"; continue; fi
            c="$(grep -oE '<Counters [^>]*/>' "$trx" | head -1 || true)"
            f="$(printf '%s' "$c" | grep -oE 'failed="[0-9]+"' | grep -oE '[0-9]+' || true)";  f="${f:-1}"
            e="$(printf '%s' "$c" | grep -oE ' error="[0-9]+"' | grep -oE '[0-9]+' || true)";  e="${e:-1}"
            a="$(printf '%s' "$c" | grep -oE ' aborted="[0-9]+"' | grep -oE '[0-9]+' || true)"; a="${a:-1}"
            if [ "$f" -eq 0 ] && [ "$e" -eq 0 ] && [ "$a" -eq 0 ]; then
              echo "${name}: ok"
            else
              echo "::error::${name}: failed=${f} error=${e} aborted=${a}"
              failed="${failed} ${name}"
            fi
          done
          [ -z "${failed}" ] || { echo "::error::Tests failed:${failed}"; exit 1; }

      - name: Pack
        # Pack EVERY packable project under src/ (auto-discovered) rather than a hand-maintained list —
        # the old explicit list silently went stale (missing Audio.Abstractions, the telephony transports,
        # and the streaming STT vendors), so the meta-package shipped with NuGet dependencies on packages
        # that were never published. Projects marked <IsPackable>false> no-op; apps/samples/bench/tests
        # live outside src/ and are excluded.
        run: |
          shopt -s nullglob
          for proj in src/*/*.csproj; do
            dotnet pack "$proj" --configuration Release --no-build --output ./artifacts -p:Version=${{ steps.version.outputs.version }}
          done

      - name: Push to NuGet
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --skip-duplicate

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: ./artifacts/*.nupkg
