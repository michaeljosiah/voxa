name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    timeout-minutes: 20   # backstop: no run should ever burn the 6h default on a hang
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Voxa.slnx

      - name: Build
        run: dotnet build Voxa.slnx --configuration Release --no-restore

      # LocalModels tests run in their own cached, network-blocked lane below — the everyday
      # inner loop stays fast and download-free.
      #
      # Run each project in its own `dotnet test` invocation, not one whole-solution run: the
      # solution-wide `dotnet test Voxa.slnx` intermittently HANGS after every test passes (vstest
      # leaves orphan test-host processes from its parallel multi-assembly teardown) — that's what
      # burned the ~6h "Build & test" runs on recent merges. Every project exits cleanly on its own;
      # a per-project `timeout` makes any future single-project hang fail fast instead of stalling.
      - name: Test
        run: |
          shopt -s nullglob
          failed=""
          for proj in tests/*/*.csproj; do
            name="$(basename "$proj" .csproj)"
            echo "::group::test ${name}"
            timeout 180 dotnet test "$proj" --configuration Release --no-build --verbosity normal \
              --filter "Category!=LocalModels" --logger "trx;LogFileName=${name}.trx"
            code=$?
            echo "::endgroup::"
            if [ "${code}" -ne 0 ]; then echo "::error::tests failed/timed out (exit ${code}): ${name}"; failed="${failed} ${name}"; fi
          done
          [ -z "${failed}" ] || { echo "Failed/hung projects:${failed}"; exit 1; }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'

  studio:
    name: Voxa Studio (Windows)
    # Studio's shipping platform. Its tests also run headless inside the ubuntu "Build & test"
    # job (the view models are Avalonia-free; Avalonia.Headless needs no display server) — this
    # lane proves the Windows leg: WASAPI-referencing build, Windows font/resource resolution.
    runs-on: windows-latest
    timeout-minutes: 15   # this single-project lane hung ~6h once; bound it hard
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # --blame-hang-timeout: if a Studio test hangs (this lane was cancelled at 6h once on
      # windows-latest), vstest kills it and writes a hang dump naming the culprit — actionable
      # data + fast failure instead of an opaque multi-hour stall.
      - name: Build & test Studio
        run: |
          dotnet build tests/Voxa.Studio.Tests --configuration Release
          dotnet test tests/Voxa.Studio.Tests --configuration Release --no-build --blame-hang-timeout 180s --logger "trx;LogFileName=studio-results.trx"

      - name: Upload Studio test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: studio-results
          path: '**/TestResults/studio-results.trx'

  local-speech:
    name: Local speech (zero network)
    runs-on: ubuntu-latest
    timeout-minutes: 45   # generous: a cache miss downloads hundreds of MB of models
    env:
      # Models cache inside the workspace so actions/cache can persist it. The integration tests
      # resolve their cache root via VoxaModelCacheOptions.ResolveCacheRoot(), which honours this
      # env var, so every consumer reads/writes this one directory — the directory we cache.
      VOXA_MODEL_CACHE: ${{ github.workspace }}/.voxa-models
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore model cache
        id: models
        uses: actions/cache@v4
        with:
          path: .voxa-models
          # The key hashes the pinned catalogs; a model bump invalidates it, nothing else does.
          # EVERY catalog a LocalModels test resolves a model from MUST be listed here — otherwise its
          # key never changes, the warm-download step is skipped on a cache hit, and the network-blocked
          # run can't find the model (this is how the pyannote segmentation model slipped through).
          # The vN prefix is a manual epoch — bump it to discard a cache saved by buggy plumbing
          # (v1 cached an incomplete dir because the tests ignored VOXA_MODEL_CACHE).
          key: voxa-models-v2-${{ runner.os }}-${{ hashFiles('src/Voxa.Speech.WhisperCpp/WhisperCppModelCatalog.cs', 'src/Voxa.Speech.Piper/PiperVoiceCatalog.cs', 'src/Voxa.Speech.Piper/PiperExecutableCatalog.cs', 'src/Voxa.Speech.Kokoro/KokoroCatalog.cs', 'src/Voxa.Audio.Diarization.Onnx/PyannoteSegmentationCatalog.cs') }}

      - name: Restore
        run: dotnet restore Voxa.slnx

      - name: Build
        run: dotnet build Voxa.slnx --configuration Release --no-restore

      # The ONLY networked step, and only on a cache miss: running the suite once populates the
      # cache through the same SHA-256-verified resolver production uses.
      - name: Warm model cache (first run after a catalog change)
        if: steps.models.outputs.cache-hit != 'true'
        run: dotnet test Voxa.slnx --configuration Release --no-build --filter "Category=LocalModels"

      # The enforcement of the zero-network claim (VLS-001): outbound HTTP is routed into a black
      # hole, so a test that secretly phones home fails this lane.
      - name: Local-model tests with outbound network blocked
        env:
          HTTP_PROXY: http://127.0.0.1:9
          HTTPS_PROXY: http://127.0.0.1:9
        run: dotnet test Voxa.slnx --configuration Release --no-build --filter "Category=LocalModels" --logger "trx;LogFileName=local-speech-results.trx"

      - name: Upload local-speech test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-speech-results
          path: '**/TestResults/local-speech-results.trx'
